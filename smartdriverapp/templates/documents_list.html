<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document List</title>

    <!-- ░░░░░ ADDED ADMIN DASHBOARD STYLES ONLY ░░░░░ -->
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1525609004556-c46c7d6cf023?auto=format&fit=crop&w=1470&q=80') 
                no-repeat center center fixed;
            background-size: cover;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Glass blur overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            z-index: -1;
        }

        h2 {
            text-align: center;
            color: #fff;
            font-size: 2rem;
            margin-bottom: 25px;
            text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.7);
        }

        /* Enhanced table look to match admin dashboard */
        table {
            width: 90%;
            border-collapse: collapse;
            margin: 20px auto;

            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            overflow: hidden;
            color: #f1f5f9;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
        }

        th, td {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: rgba(255, 255, 255, 0.25);
            font-size: 1.1rem;
            font-weight: 600;
        }

        td {
            font-size: 1rem;
        }

        img {
            max-width: 80px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .download-link {
            color: #93c5fd;
            text-decoration: none;
            font-weight: 600;
            padding: 6px 12px;
            background-color: #3b82f6;
            border-radius: 6px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.5);
        }

        .download-link:hover {
            background-color: #2563eb;
            color: white;
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.6);
        }

        .delete-btn {
            padding: 6px 12px;
            background-color: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.5);
        }

        .delete-btn:hover {
            background-color: #c82333;
            box-shadow: 0 6px 14px rgba(200, 35, 51, 0.6);
        }
    </style>

    <!-- END OF ADDED ADMIN STYLES -->
</head>

<body>

<h2 style="text-align:center;">Document List</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Uploaded File</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        {% for document in documents %}
        <tr>
            <td>{{ document.id }}</td>
            <td>{{ document.name }}</td>
            <td>{{ document.description }}</td>

            <td>
                {% if document.uploaded_documents %}
                    <a href="{{ document.uploaded_documents.url }}" 
                       target="_blank" 
                       class="download-link">
                        View
                    </a>
                {% else %}
                    No File
                {% endif %}
            </td>

            <td>
                <a href="{% url 'documents_delete' document.id %}"
                   class="delete-btn"
                   onclick="return confirm('Are you sure you want to delete this document?');">
                    Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

</body>
</html>
