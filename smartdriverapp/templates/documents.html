<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Documents</title>

<style>
    /* ---- Reset ---- */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* ---- Body (Copied from Admin Dashboard) ---- */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://images.unsplash.com/photo-1525609004556-c46c7d6cf023?auto=format&fit=crop&w=1470&q=80')
      no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 20px;
    }

    /* Glass Blur Effect from Admin Dashboard */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      z-index: -1;
    }

    /* ---- Upload Container (Converted to Glass Style) ---- */
    .upload-container {
        background: rgba(255, 255, 255, 0.15);
        padding: 35px;
        width: 420px;
        border-radius: 18px;
        backdrop-filter: blur(10px);
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
        color: #ffffff;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 2rem;
        font-weight: 700;
        color: #f1f5f9;
        letter-spacing: 1px;
    }

    label {
        font-weight: 600;
        margin-top: 15px;
        display: block;
        color: #e2e8f0;
        font-size: 1rem;
    }

    /* Inputs styled similar to admin input look */
    input, textarea {
        width: 100%;
        padding: 12px;
        margin-top: 7px;
        border-radius: 8px;
        border: none;
        background: rgba(255,255,255,0.2);
        color: #fff;
        font-size: 15px;
        backdrop-filter: blur(4px);
        transition: 0.25s ease;
    }

    input:focus, textarea:focus {
        outline: 2px solid #93c5fd;
        background: rgba(255,255,255,0.3);
    }

    textarea {
        resize: none;
        height: 90px;
    }

    /* Button styled like Admin Dashboard buttons */
    button {
        margin-top: 28px;
        width: 100%;
        background-color: #3b82f6;
        color: #fff;
        padding: 14px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1.1rem;
        font-weight: 600;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        transition: 0.3s ease;
    }

    button:hover {
        background-color: #2563eb;
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.6);
    }
</style>
</head>
<body>

<div class="upload-container">
    <h2>Upload Documents</h2>

    <form action="#" method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Enter document description"></textarea>

        <label for="file">Upload Documents</label>
        <input type="file" id="file" name="uploaded_documents" 
               accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.jpg,.png" required>

        <button type="submit">Upload</button>

    </form>
</div>

</body>
</html>
