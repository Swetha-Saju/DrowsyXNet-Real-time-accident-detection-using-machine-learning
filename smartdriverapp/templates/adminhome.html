<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    integrity="sha512-yHstK4jvuDxT1ZMQl0dbN9bB8XbGVYOj5f6uKOm4gS50lGocpQK1m+nxFgq4AE0vKJHfNMYAvuY8PdM1zTc7mw=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://images.unsplash.com/photo-1525609004556-c46c7d6cf023?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      color: #1e3a8a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
      position: relative;
    }

    /* Glass background overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      z-index: -1;
    }

    /* Navbar styling */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      z-index: 100;
      color: #f1f5f9;
      font-weight: 600;
      user-select: none;
    }

    nav .logo {
      font-size: 1.5rem;
      letter-spacing: 2px;
      font-weight: 700;
      cursor: default;
    }

    nav ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      gap: 25px;
    }

    nav ul li a {
      color: #f1f5f9;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.3s ease;
    }

    nav ul li a:hover {
      color: #93c5fd;
    }

    /* Adjust body padding so content isn't hidden under navbar */
    main, header {
      margin-top: 80px;
      max-width: 1200px;
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    header {
      background: rgba(255, 255, 255, 0.15);
      padding: 25px 40px;
      text-align: center;
      font-size: 2.5rem;
      font-weight: bold;
      color: #f8fafc;
      border-radius: 12px;
      text-shadow: 1px 1px 8px rgba(0, 0, 0, 0.6);
      margin-bottom: 50px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      user-select: none;
    }

    main {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 30px 25px;
      text-align: center;
      color: #f1f5f9;
      backdrop-filter: blur(10px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
    }

    .card h3 {
      margin-bottom: 18px;
      font-size: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .card p {
      font-size: 3rem;
      font-weight: 800;
      margin: 0 0 20px;
      color: #e0e7ff;
      font-family: 'Courier New', Courier, monospace;
    }

    .card i {
      font-size: 2.5rem;
      margin-bottom: 16px;
      color: #93c5fd;
    }

    .card a {
      display: inline-block;
      padding: 12px 24px;
      background-color: #3b82f6;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      border-radius: 8px;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }

    .card a:hover {
      background-color: #2563eb;
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.6);
    }

    .card:focus-within {
      outline: 3px solid #93c5fd;
      outline-offset: 5px;
    }

    @media (max-width: 480px) {
      nav {
        padding: 0 15px;
        font-size: 0.9rem;
      }

      header {
        font-size: 2rem;
        padding: 20px;
      }

      .card p {
        font-size: 2.2rem;
      }

      .card h3 {
        font-size: 1.2rem;
      }

      .card i {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Admin Panel</div>
    <ul>
      <li><a href="/video_feed/">Camera</a></li>
      <li><a href="{% url 'add_vehicle' %}">Add Vehicle</a></li>
      <li><a href="{% url 'vehicle_list' %}">View Vehicle</a></li>
      <li><a href="{% url 'add_driver' %}">Add Driver</a></li>
      <li><a href="{% url 'driver_list' %}">View Drivers</a></li>
    </ul>
  </nav>

  <header>Admin Dashboard</header>

  <main>
    <div class="card"  role="button" tabindex="0">
      <i class="fas fa-users"></i>
      <h3>Registered Users</h3>
      <p>{{ users_count }}</p>
      <a href="{% url 'userlist' %}">View Users</a>
    </div>

    <div class="card" onclick="location.href='#'" role="button" tabindex="0">
      <i class="fas fa-flag"></i>
      <h3>View Documents</h3>
      <p>12</p>
      <a href="/documents_list/">View Documents</a>
    </div>

    <div class="card" onclick="location.href='#'" role="button" tabindex="0">
      <i class="fas fa-cogs"></i>
      <h3>Upload Documents</h3>
      <p>📄</p>
      <a href="/documents/">Manage Documents</a>
    </div>

    <div class="card" onclick="location.href='#'" role="button" tabindex="0">
      <i class="fas fa-bell"></i>
      <h3>Notifications</h3>
      <p>5</p>
      <a href="#">View Notifications</a>
    </div>
  </main>
</body>
</html>
